<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Note - Notepad</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* Custom scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    .light ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    body {
      transition: background-color 0.2s, color 0.2s;
    }

    /* Core Mobile layout state switcher */
    @media (max-width: 767px) {
      body.show-editor #sidebar {
        display: none !important;
      }
      body.show-editor #editor {
        display: flex !important;
        width: 100% !important;
      }
      body:not(.show-editor) #sidebar {
        display: flex !important;
        width: 100% !important;
      }
      body:not(.show-editor) #editor {
        display: none !important;
      }
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans h-screen h-[100dvh] overflow-hidden flex relative">

  <!-- Sidebar (Left Column) -->
  <aside id="sidebar" class="w-full md:w-80 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col h-full shrink-0">
    
    <!-- Sidebar Header -->
    <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i data-lucide="edit-3" class="w-5 h-5 text-indigo-600 dark:text-indigo-400"></i>
        <span class="font-bold text-lg tracking-tight">Simple Note</span>
      </div>
      <!-- Theme Switcher -->
      <button id="theme-toggle" class="p-2.5 text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" aria-label="Toggle Theme">
        <i data-lucide="sun" class="w-[18px] h-[18px] hidden dark:block"></i>
        <i data-lucide="moon" class="w-[18px] h-[18px] block dark:hidden"></i>
      </button>
    </div>

    <!-- Actions Area (New Note & Search) -->
    <div class="p-4 space-y-3 border-b border-slate-100 dark:border-slate-800/60">
      <button id="btn-new-note" class="w-full py-2.5 px-4 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white font-medium transition-colors flex items-center justify-center gap-2 shadow-sm">
        <i data-lucide="plus" class="w-4 h-4"></i>
        <span>New Note</span>
      </button>
      
      <!-- Search Input -->
      <div class="relative">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
        <input 
          type="text" 
          id="search-input" 
          placeholder="Search note tags, titles..." 
          class="w-full pl-9 pr-8 py-2 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:border-indigo-500 dark:focus:border-indigo-400 rounded-lg text-sm focus:outline-none transition-colors"
        />
        <button id="btn-clear-search" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 hidden">
          <i data-lucide="x" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </div>

    <!-- Custom Category Folders Selector Bar -->
    <div id="category-filters" class="px-4 py-2 flex gap-1.5 overflow-x-auto shrink-0 select-none border-b border-slate-100 dark:border-slate-800/40 bg-slate-50/50 dark:bg-slate-950/20 scrollbar-none">
      <button data-filter="all" class="px-3 py-1 text-xs font-semibold rounded-full bg-indigo-600 text-white shadow-sm shrink-0 transition-all focus:outline-none">All</button>
      <button data-filter="work" class="px-3 py-1 text-xs font-medium rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 shrink-0 transition-all hover:bg-slate-50 dark:hover:bg-slate-800 focus:outline-none">Work</button>
      <button data-filter="personal" class="px-3 py-1 text-xs font-medium rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 shrink-0 transition-all hover:bg-slate-50 dark:hover:bg-slate-800 focus:outline-none">Personal</button>
      <button data-filter="ideas" class="px-3 py-1 text-xs font-medium rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 shrink-0 transition-all hover:bg-slate-50 dark:hover:bg-slate-800 focus:outline-none">Ideas</button>
      <button data-filter="todo" class="px-3 py-1 text-xs font-medium rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 shrink-0 transition-all hover:bg-slate-50 dark:hover:bg-slate-800 focus:outline-none">Todo</button>
    </div>

    <!-- Notes List container -->
    <div id="notes-list" class="flex-1 overflow-y-auto p-3 space-y-2">
      <!-- Notes cards inject dynamically here -->
    </div>
  </aside>

  <!-- Editor Container (Right Column) -->
  <main id="editor" class="flex-1 flex flex-col h-full bg-white dark:bg-slate-950 overflow-hidden">
    
    <!-- Editor Header Toolbar -->
    <div class="px-5 py-3 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-950/50 backdrop-blur shrink-0 select-none">
      <div class="flex items-center gap-3">
        <!-- Back Button (Visible only on mobile layout) -->
        <button id="btn-back" class="md:hidden flex items-center gap-1 text-indigo-600 dark:text-indigo-400 font-medium py-1.5 pr-3 pl-1 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-lg transition-colors">
          <i data-lucide="chevron-left" class="w-5 h-5"></i>
          <span>Notes</span>
        </button>
        <span id="editor-indicator" class="hidden md:inline text-xs font-semibold uppercase tracking-wider text-slate-400">Editor</span>

        <!-- Markdown Mode Toggle Switcher -->
        <div id="editor-mode-toggle" class="flex border border-slate-200 dark:border-slate-800 rounded-lg p-0.5 bg-slate-100 dark:bg-slate-900 shrink-0">
          <button id="btn-mode-edit" class="px-3 py-1 text-xs font-semibold rounded-md bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 shadow-sm transition-all focus:outline-none">
            Edit
          </button>
          <button id="btn-mode-preview" class="px-3 py-1 text-xs font-medium rounded-md text-slate-500 dark:text-slate-400 transition-all hover:text-slate-800 dark:hover:text-slate-200 focus:outline-none">
            Preview
          </button>
        </div>
      </div>

      <!-- Action Options -->
      <div id="note-actions" class="flex items-center gap-1.5 md:gap-2">
        <!-- Quick New Note button inside editor header (Only visible on mobile layout) -->
        <button id="btn-mobile-new" class="md:hidden p-2 text-indigo-600 dark:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-lg transition-colors" title="New Note">
          <i data-lucide="plus" class="w-5 h-5"></i>
        </button>
        
        <button id="btn-export" class="flex items-center gap-1.5 px-3 py-1.5 border border-slate-200 dark:border-slate-800 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 text-sm font-medium transition-colors bg-white dark:bg-slate-900" title="Export to TXT">
          <i data-lucide="download" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Export</span>
        </button>
        <button id="btn-delete" class="flex items-center gap-1.5 px-3 py-1.5 border border-rose-200 dark:border-rose-950/40 rounded-lg text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-950/20 text-sm font-medium transition-colors bg-white dark:bg-slate-900" title="Delete Note">
          <i data-lucide="trash-2" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Delete</span>
        </button>
      </div>
    </div>

    <!-- Active Writing Workspace -->
    <div id="editor-container" class="flex-1 flex flex-col p-5 md:p-8 space-y-4 overflow-y-auto">
      
      <!-- Metadata Row: Category select & Tags edit -->
      <div class="flex flex-wrap items-center gap-4 text-sm pb-3 border-b border-slate-100 dark:border-slate-800/60 shrink-0 select-none">
        <!-- Folder Category dropdown select -->
        <div class="flex items-center gap-1.5">
          <i data-lucide="folder" class="w-4 h-4 text-slate-400 dark:text-slate-500"></i>
          <span class="text-slate-400 dark:text-slate-500 font-semibold text-[10px] uppercase tracking-wider">Category:</span>
          <select id="note-category" class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded px-2.5 py-1 text-xs focus:outline-none focus:border-indigo-500 dark:focus:border-indigo-400 transition-colors font-medium cursor-pointer">
            <option value="uncategorized">Uncategorized</option>
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="ideas">Ideas</option>
            <option value="todo">Todo</option>
          </select>
        </div>
        
        <!-- Tag values input -->
        <div class="flex items-center gap-1.5 flex-1 min-w-[160px]">
          <i data-lucide="tag" class="w-4 h-4 text-slate-400 dark:text-slate-500"></i>
          <span class="text-slate-400 dark:text-slate-500 font-semibold text-[10px] uppercase tracking-wider shrink-0">Tags:</span>
          <input 
            type="text" 
            id="note-tags" 
            placeholder="e.g. documentation, progress (comma separated)" 
            class="flex-1 bg-transparent border-b border-dashed border-slate-200 dark:border-slate-800 focus:border-indigo-500 dark:focus:border-indigo-400 focus:outline-none text-xs py-1 transition-colors font-medium"
          />
        </div>
      </div>

      <!-- Title element -->
      <input 
        type="text" 
        id="note-title" 
        placeholder="Note Title" 
        class="w-full text-2xl font-bold bg-transparent focus:outline-none border-none text-slate-900 dark:text-white caret-indigo-500 shrink-0"
      />
      
      <!-- Text Area Editor -->
      <textarea 
        id="note-body" 
        placeholder="Start writing your note here (Supports Markdown: # Header, **bold**, *italic*...)" 
        class="w-full flex-1 bg-transparent focus:outline-none border-none resize-none text-base leading-relaxed text-slate-700 dark:text-slate-300 caret-indigo-500"
      ></textarea>
      
      <!-- Markdown Rendered Preview Pane -->
      <div 
        id="note-preview" 
        class="hidden w-full flex-1 overflow-y-auto text-base leading-relaxed text-slate-700 dark:text-slate-350 select-text prose dark:prose-invert max-w-none"
      ></div>
    </div>

    <!-- Empty State View -->
    <div id="empty-container" class="flex-1 hidden flex-col items-center justify-center p-6 text-center">
      <div class="w-16 h-16 rounded-full bg-slate-100 dark:bg-slate-900 flex items-center justify-center text-slate-400 mb-4">
        <i data-lucide="sticky-note" class="w-8 h-8"></i>
      </div>
      <h3 class="text-lg font-semibold text-slate-700 dark:text-slate-300 mb-1">No Note Selected</h3>
      <p class="text-sm text-slate-500 max-w-xs mb-4">Select a note from the list, or create a new note to start editing.</p>
      <div class="flex items-center gap-2">
        <button id="btn-empty-new-note" class="py-2 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg transition-colors">
          Create Note
        </button>
        <!-- Mobile browse trigger -->
        <button id="btn-empty-browse" class="md:hidden py-2 px-4 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 font-medium rounded-lg transition-colors">
          Browse Notes
        </button>
      </div>
    </div>

    <!-- Status Bar Footer -->
    <footer id="editor-footer" class="px-5 py-2.5 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between text-xs text-slate-500 bg-slate-50/50 dark:bg-slate-950/50 shrink-0">
      <div class="flex items-center gap-4">
        <span>Words: <strong id="word-count" class="text-slate-700 dark:text-slate-300">0</strong></span>
        <span>Chars: <strong id="char-count" class="text-slate-700 dark:text-slate-300">0</strong></span>
      </div>
      <div class="flex items-center gap-1.5">
        <i data-lucide="clock" class="w-3.5 h-3.5"></i>
        <span id="modified-time">Never</span>
      </div>
    </footer>
  </main>

  <!-- Toast Notification element -->
  <div id="toast" class="fixed bottom-4 right-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium transition-all duration-300 transform translate-y-10 opacity-0 pointer-events-none z-50 flex items-center gap-2">
    <span id="toast-message">Notification</span>
  </div>

  <script>
    // LocalStorage Keys
    const STATE_KEY = 'simplenote_state';
    const THEME_KEY = 'simplenote_theme';

    // Core app state
    let state = {
      notes: [],                  // Array of notes: { id, title, body, category, tags, updatedAt }
      activeId: null,             // Active Note UUID
      searchQuery: '',
      activeCategoryFilter: 'all', // Active Folder filter ('all', 'work', 'personal', 'ideas', 'todo')
      isMarkdownPreview: false    // Edit vs Preview state toggles
    };

    // DOM references
    const sidebar = document.getElementById('sidebar');
    const editor = document.getElementById('editor');
    const notesListContainer = document.getElementById('notes-list');
    const noteTitleInput = document.getElementById('note-title');
    const noteBodyTextarea = document.getElementById('note-body');
    const notePreviewDiv = document.getElementById('note-preview');
    const noteCategorySelect = document.getElementById('note-category');
    const noteTagsInput = document.getElementById('note-tags');
    
    const charCountElement = document.getElementById('char-count');
    const wordCountElement = document.getElementById('word-count');
    const modifiedTimeElement = document.getElementById('modified-time');
    const searchInput = document.getElementById('search-input');
    const btnClearSearch = document.getElementById('btn-clear-search');
    const categoryFiltersRow = document.getElementById('category-filters');
    
    const editorContainer = document.getElementById('editor-container');
    const emptyContainer = document.getElementById('empty-container');
    const noteActions = document.getElementById('note-actions');
    const editorFooter = document.getElementById('editor-footer');
    
    // Markdown Mode Toggles buttons
    const btnModeEdit = document.getElementById('btn-mode-edit');
    const btnModePreview = document.getElementById('btn-mode-preview');

    // Category styling color definitions
    const categoryColors = {
      work: {
        border: 'border-l-4 border-l-blue-500',
        bg: 'hover:bg-blue-50/20 dark:hover:bg-blue-950/10'
      },
      personal: {
        border: 'border-l-4 border-l-emerald-500',
        bg: 'hover:bg-emerald-50/20 dark:hover:bg-emerald-950/10'
      },
      ideas: {
        border: 'border-l-4 border-l-purple-500',
        bg: 'hover:bg-purple-50/20 dark:hover:bg-purple-950/10'
      },
      todo: {
        border: 'border-l-4 border-l-amber-500',
        bg: 'hover:bg-amber-50/20 dark:hover:bg-amber-950/10'
      },
      uncategorized: {
        border: 'border-l-4 border-l-transparent',
        bg: 'hover:bg-slate-50 dark:hover:bg-slate-800/40'
      }
    };

    // Client side Markdown Parsing Parser Engine
    function parseMarkdown(md) {
      if (!md) return '<p class="text-slate-400 dark:text-slate-600 italic">Start typing markdown to preview...</p>';
      
      // Escape markup symbols to protect from basic code injections
      let html = md
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Multiline Code Blocks: ```js ... ```
      html = html.replace(/```([\s\S]*?)```/gm, function(match, code) {
        return `<pre class="bg-slate-100 dark:bg-slate-900/80 p-3 rounded-lg overflow-x-auto text-xs font-mono my-4 text-slate-800 dark:text-slate-200 border border-slate-200 dark:border-slate-800">${code.trim()}</pre>`;
      });

      // Headers: #, ##, ###
      html = html.replace(/^### (.*$)/gim, '<h3 class="text-base font-bold text-slate-800 dark:text-slate-100 mt-4 mb-1.5">$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2 class="text-lg font-bold text-slate-900 dark:text-white mt-5 mb-2 border-b border-slate-100 dark:border-slate-800/60 pb-1">$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1 class="text-xl font-extrabold text-slate-900 dark:text-white mt-6 mb-3 border-b border-slate-200 dark:border-slate-800 pb-1.5">$1</h1>');

      // Blockquotes: > quote
      html = html.replace(/^\>&nbsp;(.*$)/gim, '<blockquote class="border-l-4 border-indigo-500 pl-4 my-4 italic text-slate-600 dark:text-slate-400 bg-slate-50 dark:bg-slate-900/50 py-1 pr-2 rounded-r">$1</blockquote>');
      html = html.replace(/^\> (.*$)/gim, '<blockquote class="border-l-4 border-indigo-500 pl-4 my-4 italic text-slate-600 dark:text-slate-400 bg-slate-50 dark:bg-slate-900/50 py-1 pr-2 rounded-r">$1</blockquote>');

      // Horizontal lines
      html = html.replace(/^---$/gim, '<hr class="my-6 border-slate-200 dark:border-slate-800" />');

      // Bullet Lists
      html = html.replace(/^\s*[-*]\s+(.*$)/gim, '<li class="ml-5 list-disc mt-1 text-slate-700 dark:text-slate-350">$1</li>');

      // Numbered Lists
      html = html.replace(/^\s*\d+\.\s+(.*$)/gim, '<li class="ml-5 list-decimal mt-1 text-slate-700 dark:text-slate-350">$1</li>');

      // Bold & Italics
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
      html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');
      html = html.replace(/_(.*?)_/g, '<em>$1</em>');

      // Inline code snippets
      html = html.replace(/`(.*?)`/g, '<code class="bg-slate-100 dark:bg-slate-900 px-1.5 py-0.5 rounded text-xs font-mono text-indigo-600 dark:text-indigo-400 font-semibold">$1</code>');

      // Line break preservation
      html = html.replace(/\n/g, '<br>');

      return html;
    }

    // Toast Notification Manager
    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      toast.classList.remove('translate-y-10', 'opacity-0');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.add('translate-y-10', 'opacity-0');
      }, 2500);
    }

    // Theme Switch System
    function initTheme() {
      const savedTheme = localStorage.getItem(THEME_KEY);
      const isDark = savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    }

    // Toggle light and dark theme mode
    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark');
      if (isDark) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem(THEME_KEY, 'light');
        showToast('Theme switched to Light');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem(THEME_KEY, 'dark');
        showToast('Theme switched to Dark');
      }
    }

    // Helper: Formatter for timestamps
    function formatTime(timestamp) {
      if (!timestamp) return 'Never';
      const date = new Date(timestamp);
      return date.toLocaleDateString(undefined, { 
        month: 'short', 
        day: 'numeric', 
        hour: '2-digit', 
        minute: '2-digit' 
      });
    }

    // Helper: Generate body previews
    function getSnippet(text) {
      if (!text) return 'Empty note...';
      const clean = text.replace(/\s+/g, ' ').trim();
      return clean.length > 55 ? clean.substring(0, 55) + '...' : clean;
    }

    // Save notes to localStorage
    function saveNotes() {
      try {
        localStorage.setItem(STATE_KEY, JSON.stringify({
          notes: state.notes,
          activeId: state.activeId
        }));
      } catch (err) {
        console.warn('LocalStorage unavailable.', err);
      }
    }

    // Load notes from localStorage
    function loadNotes() {
      try {
        const saved = localStorage.getItem(STATE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          state.notes = parsed.notes || [];
          state.activeId = parsed.activeId || null;
        }
      } catch (err) {
        console.warn('Failed to load note database.', err);
      }
    }

    // Responsive layout visibility triggers using show-editor body toggle state
    function updateLayoutVisibility() {
      if (state.activeId) {
        document.body.classList.add('show-editor');
      } else {
        document.body.classList.remove('show-editor');
      }
    }

    // Note Selection & Load Engine
    function loadActiveNote() {
      const note = state.notes.find(n => n.id === state.activeId);
      
      if (note) {
        editorContainer.classList.remove('hidden');
        editorFooter.classList.remove('hidden');
        noteActions.classList.remove('opacity-0', 'pointer-events-none');
        emptyContainer.classList.add('hidden');

        noteTitleInput.value = note.title || '';
        noteBodyTextarea.value = note.body || '';
        noteCategorySelect.value = note.category || 'uncategorized';
        noteTagsInput.value = note.tags || '';
        
        // Reset view mode on note load
        setEditorMode(false);
        updateCounters();
        modifiedTimeElement.textContent = formatTime(note.updatedAt);
      } else {
        editorContainer.classList.add('hidden');
        editorFooter.classList.add('hidden');
        noteActions.classList.add('opacity-0', 'pointer-events-none');
        emptyContainer.classList.remove('hidden');
      }
      
      updateLayoutVisibility();
    }

    // Word and character count calculators
    function updateCounters() {
      const val = noteBodyTextarea.value || '';
      charCountElement.textContent = val.length;
      
      const words = val.trim() === '' ? 0 : val.trim().split(/\s+/).length;
      wordCountElement.textContent = words;
    }

    // Markdown Mode Toggler Handler
    function setEditorMode(previewMode) {
      state.isMarkdownPreview = previewMode;
      
      if (previewMode) {
        // Toggle view containers
        noteBodyTextarea.classList.add('hidden');
        notePreviewDiv.classList.remove('hidden');
        
        // Compile markdown raw value into HTML
        notePreviewDiv.innerHTML = parseMarkdown(noteBodyTextarea.value);
        
        // Render Lucide icons inside preview if any
        lucide.createIcons();
        
        // Toggle buttons active classes
        btnModePreview.className = "px-3 py-1 text-xs font-semibold rounded-md bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 shadow-sm transition-all focus:outline-none";
        btnModeEdit.className = "px-3 py-1 text-xs font-medium rounded-md text-slate-500 dark:text-slate-400 transition-all hover:text-slate-800 dark:hover:text-slate-200 focus:outline-none";
      } else {
        // Toggle view containers
        noteBodyTextarea.classList.remove('hidden');
        notePreviewDiv.classList.add('hidden');
        
        // Toggle buttons active classes
        btnModeEdit.className = "px-3 py-1 text-xs font-semibold rounded-md bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 shadow-sm transition-all focus:outline-none";
        btnModePreview.className = "px-3 py-1 text-xs font-medium rounded-md text-slate-500 dark:text-slate-400 transition-all hover:text-slate-800 dark:hover:text-slate-200 focus:outline-none";
      }
    }

    // CRUD: Create Note
    function createNote() {
      const newNote = {
        id: 'note_' + Date.now(),
        title: '',
        body: '',
        category: 'uncategorized',
        tags: '',
        updatedAt: Date.now()
      };
      
      state.notes.unshift(newNote);
      state.activeId = newNote.id;
      
      saveNotes();
      renderNotesList();
      loadActiveNote();
      
      noteTitleInput.focus();
      showToast('Created new note');
    }

    // CRUD: Delete Note
    function deleteNote(id, event) {
      if (event) event.stopPropagation(); // Stop card selection
      
      const index = state.notes.findIndex(n => n.id === id);
      if (index === -1) return;
      
      const title = state.notes[index].title || 'Untitled Note';
      state.notes.splice(index, 1);
      
      if (state.activeId === id) {
        state.activeId = state.notes.length > 0 ? state.notes[0].id : null;
      }
      
      saveNotes();
      renderNotesList();
      loadActiveNote();
      
      showToast(`Deleted "${title}"`);
    }

    // CRUD: Select note
    function selectNote(id) {
      state.activeId = id;
      saveNotes();
      renderNotesList();
      loadActiveNote();
    }

    // CRUD: Live input keypress saving triggers
    function handleTypingInput() {
      if (!state.activeId) return;
      
      const index = state.notes.findIndex(n => n.id === state.activeId);
      if (index === -1) return;
      
      state.notes[index].title = noteTitleInput.value;
      state.notes[index].body = noteBodyTextarea.value;
      state.notes[index].updatedAt = Date.now();
      
      saveNotes();
      updateCounters();
      modifiedTimeElement.textContent = formatTime(state.notes[index].updatedAt);
      
      // Inline update sidebar list item to preserve cursor focus
      updateSidebarCardPreview(state.notes[index]);
    }

    // Category / Metadata live update
    function handleMetadataChange() {
      if (!state.activeId) return;
      
      const index = state.notes.findIndex(n => n.id === state.activeId);
      if (index === -1) return;
      
      state.notes[index].category = noteCategorySelect.value;
      state.notes[index].tags = noteTagsInput.value;
      state.notes[index].updatedAt = Date.now();
      
      saveNotes();
      modifiedTimeElement.textContent = formatTime(state.notes[index].updatedAt);
      
      // Re-render notes list because category folder filters and card styling may change
      renderNotesList();
    }

    // Inline update card previews dynamically to avoid resetting element lists on keypress
    function updateSidebarCardPreview(note) {
      const card = document.querySelector(`[data-id="${note.id}"]`);
      if (card) {
        const titleEl = card.querySelector('.card-title');
        const previewEl = card.querySelector('.card-preview');
        const timeEl = card.querySelector('.card-time');
        
        if (titleEl) titleEl.textContent = note.title.trim() || 'Untitled Note';
        if (previewEl) previewEl.textContent = getSnippet(note.body);
        if (timeEl) timeEl.textContent = formatTime(note.updatedAt);
      }
    }

    // Export note contents as .txt file
    function exportNote() {
      if (!state.activeId) return;
      const note = state.notes.find(n => n.id === state.activeId);
      if (!note) return;
      
      const title = note.title.trim() || 'Untitled Note';
      const fileData = `${title}\n${'='.repeat(title.length)}\n\nCategory: ${note.category}\nTags: ${note.tags || 'none'}\n\n${note.body || ''}`;
      
      const filename = title
        .toLowerCase()
        .replace(/[^a-z0-9]/gi, '_')
        .replace(/_{2,}/g, '_')
        .trim() + '.txt';

      try {
        const blob = new Blob([fileData], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('Exported note successfully');
      } catch (err) {
        console.error('File generation failure:', err);
        showToast('Export failed.');
      }
    }

    // Notes list renderer
    function renderNotesList() {
      notesListContainer.innerHTML = '';
      
      const filtered = state.notes.filter(note => {
        // 1. Search Query filter (checks title, body, and tags)
        const q = state.searchQuery.toLowerCase();
        const matchesSearch = (note.title || '').toLowerCase().includes(q) || 
                              (note.body || '').toLowerCase().includes(q) ||
                              (note.tags || '').toLowerCase().includes(q);
        
        // 2. Folder Category Filter
        const matchesCategory = state.activeCategoryFilter === 'all' || 
                                (note.category || 'uncategorized') === state.activeCategoryFilter;
        
        return matchesSearch && matchesCategory;
      });

      if (filtered.length === 0) {
        notesListContainer.innerHTML = `
          <div class="text-center py-10 text-slate-400 dark:text-slate-600 text-sm select-none">
            <p>No notes found</p>
          </div>
        `;
        return;
      }

      filtered.forEach(note => {
        const isActive = note.id === state.activeId;
        const category = note.category || 'uncategorized';
        const cardStyle = categoryColors[category] || categoryColors.uncategorized;
        
        // Convert tags string to list array badges
        const tagList = note.tags 
          ? note.tags.split(',').map(t => t.trim()).filter(t => t.length > 0) 
          : [];

        const card = document.createElement('div');
        card.setAttribute('data-id', note.id);
        
        card.className = `p-3.5 rounded-lg border cursor-pointer transition-all relative group select-none ${cardStyle.border} ${cardStyle.bg} ${
          isActive 
            ? 'bg-indigo-50/70 border-indigo-200 dark:bg-indigo-950/20 dark:border-indigo-900/50 shadow-sm' 
            : 'bg-white border-slate-150 dark:bg-slate-900/40 dark:border-slate-800/80 dark:hover:border-slate-700'
        }`;

        let tagsBadgesHtml = '';
        if (tagList.length > 0) {
          tagsBadgesHtml = `<div class="flex flex-wrap gap-1 mt-1.5">` + 
            tagList.map(tag => `<span class="px-1.5 py-0.5 rounded bg-slate-100/80 dark:bg-slate-800/70 text-[9px] text-slate-500 dark:text-slate-450 font-medium font-mono border border-slate-200/20">#${tag}</span>`).join('') +
            `</div>`;
        }

        card.innerHTML = `
          <div class="pr-8">
            <h4 class="card-title font-semibold text-sm truncate ${
              isActive ? 'text-indigo-700 dark:text-indigo-400' : 'text-slate-800 dark:text-slate-200'
            }">${note.title.trim() || 'Untitled Note'}</h4>
            <p class="card-preview text-xs text-slate-500 dark:text-slate-400 mt-1 truncate">${getSnippet(note.body)}</p>
            ${tagsBadgesHtml}
            <span class="card-time text-[10px] text-slate-400 dark:text-slate-500 font-medium block mt-2">${formatTime(note.updatedAt)}</span>
          </div>
          <!-- Delete button (visible always on mobile/tablet, hover-only on desktop) -->
          <button class="btn-del-item absolute right-2 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/30 rounded opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity" title="Delete Note">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        `;

        card.addEventListener('click', () => selectNote(note.id));
        card.querySelector('.btn-del-item').addEventListener('click', (e) => deleteNote(note.id, e));

        notesListContainer.appendChild(card);
      });

      lucide.createIcons();
    }

    // Sidebar Folder Filtering Actions
    function handleCategoryFilterClick(event) {
      const button = event.target.closest('[data-filter]');
      if (!button) return;

      state.activeCategoryFilter = button.getAttribute('data-filter');

      // Update styling states of buttons
      const buttons = categoryFiltersRow.querySelectorAll('[data-filter]');
      buttons.forEach(btn => {
        const isSelected = btn.getAttribute('data-filter') === state.activeCategoryFilter;
        if (isSelected) {
          btn.className = "px-3 py-1 text-xs font-semibold rounded-full bg-indigo-600 text-white shadow-sm shrink-0 transition-all focus:outline-none";
        } else {
          btn.className = "px-3 py-1 text-xs font-medium rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 shrink-0 transition-all hover:bg-slate-50 dark:hover:bg-slate-800 focus:outline-none";
        }
      });

      // Filter notes list
      renderNotesList();
    }

    // App Bootstrapper
    function initApp() {
      loadNotes();
      initTheme();

      // Setup default welcome note with styled markdown format on empty database
      if (state.notes.length === 0) {
        state.notes.push({
          id: 'note_welcome',
          title: 'Welcome to Simple Note 🚀',
          body: '# Simple Note Guide\nThis is a lightweight and clean notepad web application.\n\n## 📝 Markdown Support\nYou can write standard markdown in Edit mode and preview it inside the **Preview** tab. We support:\n- **Bold text** and *italic emphasizes*\n- Bullet lists and numbered selections\n- Inline `code snippets` and blocks:\n```\nconst notepad = "Simple Note";\nconsole.log(notepad);\n```\n- Blockquotes for calling out instructions:\n> Simple Note runs offline-first and stores files locally in your browser!\n\n## 📂 Folder Category Filters\nUse the dropdown select row below the title to set category folders:\n- **Work** (subtle blue cards)\n- **Personal** (subtle green cards)\n- **Ideas** (subtle purple cards)\n- **Todo** (subtle amber cards)\n\nYou can click on the category pills in the sidebar header to filter your list immediately!\n\n## 🏷️ Custom Note Tagging\nWrite tags in the tags input box separated by commas. Tag badges will display under note previews in the sidebar.',
          category: 'ideas',
          tags: 'welcome, markdown, tutorial',
          updatedAt: Date.now()
        });
        state.activeId = 'note_welcome';
        saveNotes();
      }

      renderNotesList();
      loadActiveNote();

      // Typing Listeners
      noteTitleInput.addEventListener('input', handleTypingInput);
      noteBodyTextarea.addEventListener('input', handleTypingInput);
      
      // Metadata change listeners
      noteCategorySelect.addEventListener('change', handleMetadataChange);
      noteTagsInput.addEventListener('input', handleMetadataChange);

      // Markdown switches listeners
      btnModeEdit.addEventListener('click', () => setEditorMode(false));
      btnModePreview.addEventListener('click', () => setEditorMode(true));

      // Buttons Listeners
      document.getElementById('btn-new-note').addEventListener('click', createNote);
      document.getElementById('btn-empty-new-note').addEventListener('click', createNote);
      document.getElementById('btn-mobile-new').addEventListener('click', createNote);
      
      document.getElementById('btn-delete').addEventListener('click', () => {
        if (state.activeId) deleteNote(state.activeId);
      });
      document.getElementById('btn-export').addEventListener('click', exportNote);
      document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
      
      // Mobile Back button navigation trigger
      document.getElementById('btn-back').addEventListener('click', () => {
        state.activeId = null;
        saveNotes();
        renderNotesList();
        loadActiveNote();
      });

      // Empty State Browse notes trigger (opens list on mobile)
      document.getElementById('btn-empty-browse').addEventListener('click', () => {
        state.activeId = null;
        loadActiveNote();
      });

      // Category filter container triggers
      categoryFiltersRow.addEventListener('click', handleCategoryFilterClick);

      // Search Inputs
      searchInput.addEventListener('input', () => {
        state.searchQuery = searchInput.value;
        if (state.searchQuery) {
          btnClearSearch.classList.remove('hidden');
        } else {
          btnClearSearch.classList.add('hidden');
        }
        renderNotesList();
      });

      btnClearSearch.addEventListener('click', () => {
        searchInput.value = '';
        state.searchQuery = '';
        btnClearSearch.classList.add('hidden');
        renderNotesList();
        searchInput.focus();
      });

      // Window resize layout update triggers
      window.addEventListener('resize', updateLayoutVisibility);

      // Render vector icons
      lucide.createIcons();
    }

    window.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
